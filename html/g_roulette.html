<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unlock the Lecture</title>
    <link rel="stylesheet" href="../g_roulette/css/g_roulette.css" />
    <link rel="stylesheet" href="../g_line/css/g_line.css" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../settings.css" />
    <link
      rel="shortcut icon"
      href="../asset/img/favicon.ico"
      type="image/x-icon"
    />
  </head>
  <body>
    <div id="root">
      <header id="header">
        <div class="logo">
          <span>Unlock the Lecture</span>
        </div>
        <div class="stage-info">
          <span id="stage-name"></span>
        </div>
      </header>

      <div id="settings-wrapper">
        <div id="settings-btn" class="settings-icon">
          <img src="../asset/img/settings-icon.png" alt="환경설정" />
        </div>
      </div>

      <div id="settings-modal" class="modal-overlay" style="display: none">
        <div class="modal-content">
          <h2 class="modal-title">MENU</h2>
          <div class="modal-buttons">
            <button id="btn-restart-all" class="menu-btn">처음부터</button>
            <button id="btn-restart-stage" class="menu-btn">다시시작</button>
            <button id="btn-skip-stage" class="menu-btn">넘어가기</button>
          </div>
          <button id="btn-close-modal" class="close-btn">닫기</button>
        </div>
      </div>

      <main id="container" class="sort">
        <p id="roulette-guide">버튼을 눌러 룰렛을 돌리세요</p>
        <div class="roulette-wrap">
          <canvas id="rouletteCanvas" width="500" height="500"></canvas>
        </div>
        <p id="result-display"></p>
        <button id="startButton" class="buttontop">룰렛 돌리기</button>
      </main>
    </div>
    <script src="../g_roulette/js/g_roulette.js" defer></script>
    <script src="../main.js" defer></script>
    <script src="../settings.js" defer></script>
  </body>
</html>
