<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Layout Frame</title>
    <link rel="stylesheet" href="../g_roulette/css/g_roulette.css" />
  </head>
  <body>
    <div id="root">
      <header id="header">
        <div class="logo">
          <span>LOGO</span>
        </div>
        <div class="stage-info">
          <span id="stage-name">룰렛게임</span>
        </div>
      </header>

      <main id="container">
        <canvas id="rouletteCanvas" width="500" height="500"></canvas>
        <p id="result-display"></p>
        <button id="startButton">룰렛 돌리기</button>
      </main>
    </div>
    <script src="../g_roulette/js/g_roulette.js"></script>
</body>
</html>
