<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사진 찍기 게임</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../settings.css" />
    <link rel="stylesheet" href="../g_photo/css/g_photo.css" />
  </head>
  <body>
    <div id="root">
      <div id="settings-wrapper">
        <div id="settings-btn" class="settings-icon">
          <img src="../asset/img/settings-icon.png" alt="환경설정" />
        </div>
      </div>

      <div id="settings-modal" class="modal-overlay" style="display: none">
        <div class="modal-content">
          <h2 class="modal-title">환경설정</h2>
          <div class="modal-buttons">
            <button id="btn-restart-all" class="menu-btn">처음부터</button>
            <button id="btn-restart-stage" class="menu-btn">다시시작</button>
            <button id="btn-skip-stage" class="menu-btn">넘어가기</button>
          </div>
          <button id="btn-close-modal" class="close-btn">닫기</button>
        </div>
      </div>

      <header id="header">
        <div class="logo"><span>Unlock the Lecture</span></div>
        <div class="stage-info">
          <span id="stage-name">stage 11 : 버튼을 스페이스바로 맞춰라!</span>
        </div>
      </header>

      <main id="container">
        <p id="rgb-guide">수업하기를 스페이스바로 맞춰라!</p>
        <div id="gaugeContainer">
          <div id="gaugeFill"></div>
          <span id="gaugeText">0%</span>
        </div>
        <div id="conveyorArea">
          <div id="beltItems"></div>
          <div id="detectionZone"></div>
        </div>
        <div id="controlBox" style="display: none">수업하기</div>
      </main>
    </div>
    <script src="../main.js" defer></script>
    <script src="../g_photo/js/g_photo.js" defer></script>
    <script src="../settings.js" defer></script>
  </body>
</html>
