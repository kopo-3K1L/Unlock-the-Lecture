<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unlock the Lecture</title>

    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../settings.css" />
    <link rel="stylesheet" href="../g_stairs/css/g_stairs.css" />
  </head>
  <body>
    <div id="root">
      <div id="settings-wrapper">
        <div id="settings-btn" class="settings-icon">
          <img src="../asset/img/settings-icon.png" alt="환경설정" />
        </div>
      </div>
      <div id="settings-modal" class="modal-overlay" style="display: none">
        <div class="modal-content">
          <h2 class="modal-title">MENU</h2>
          <div class="modal-buttons">
            <button id="btn-restart-all" class="menu-btn">처음부터</button>
            <button id="btn-restart-stage" class="menu-btn">다시시작</button>
            <button id="btn-skip-stage" class="menu-btn">넘어가기</button>
          </div>
          <button id="btn-close-modal" class="close-btn">닫기</button>
        </div>
      </div>
      <header id="header">
        <div class="logo">
          <span>Unlock the Lecture</span>
        </div>
        <div class="stage-info">
          <span id="stage-name"></span>
        </div>
      </header>

      <main id="container">
        <div id="stairs-guide">
          <span id="score"></span>
          <span
            >← → 키로 10층까지 올라가 교수님의 점심시간을 보장해 주세요</span
          >
          <span id="timer"></span>
        </div>
        <div id="game-area">
          <div id="character"></div>
          <!-- 계단 js -->
        </div>

        <div id="ui">
          <div id="message">
            <button id="start-btn">시작</button>
            <div class="btn-row hidden" id="fail-btns">
              <button id="retry-btn">재시도</button>
              <button id="fail-btn">수업 안 함</button>
            </div>
            <button id="next-btn" class="hidden">수업한다</button>
          </div>
        </div>
      </main>
    </div>

    <script src="../main.js" defer></script>
    <script src="../g_stairs/js/g_stairs.js" defer></script>
    <script src="../settings.js" defer></script>
  </body>
</html>
