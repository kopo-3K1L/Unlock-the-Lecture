<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>무한의 계단</title>

    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../g_stairs/css/g_stairs.css" />
  </head>
  <body>
    <div id="root">
      <header id="header">
        <div class="logo">
          <span>LOGO</span>
        </div>
        <div class="stage-info">
          <span id="stage-name">현재 스테이지: 1단계</span>
        </div>
      </header>

      <main id="container">
        <div id="stairs-guide">
          <span id="score"></span>
          <span>← → 키로 계단을 올라가세요</span>
          <span id="timer"></span>
        </div>
        <div id="game-area">
          <div id="character"></div>
          <!-- 계단 js -->
        </div>

        <div id="ui">
          <div id="message">
            <button id="start-btn">시작</button>
            <div class="btn-row hidden" id="fail-btns">
              <button id="retry-btn">재시도</button>
              <button id="start-btn-fail">수업 안 함</button>
            </div>
            <button id="next-btn" class="hidden">수업한다</button>
          </div>
        </div>
      </main>
    </div>

    <script src="../g_stairs/js/g_stairs.js" defer></script>
  </body>
</html>
