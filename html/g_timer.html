<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>타이머 게임</title>
    <link rel="stylesheet" href="../g_timer/css/g_timer.css" />
  </head>
  <body>
    <div id="root">
      <div id="header">
        <div class="logo">
          <span>타이머 게임</span>
        </div>
        <div id="stage-info">stage 1 : 5.00초를 맞춰라!</div>
      </div>

      <div id="container">
        <div class="game-wrapper">
          <div id="warning-message">5초를 맞춰라</div>

          <div id="stopwatch" class="stopwatch">
            <div class="inner-circle">
              <div id="status-text">수업 준비중!</div>
              <div id="timer-display">0.00</div>
              <button id="action-btn" onclick="handleTimer()">시작하기</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="../g_timer/js/g_timer.js"></script>
  </body>
</html>
