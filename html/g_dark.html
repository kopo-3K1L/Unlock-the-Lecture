<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unlock the Lecture</title>

    <!-- 공통 스타일 선언 -->
    <link rel="stylesheet" href="../style.css" />

    <!-- reset 스타일 선언 -->
    <link rel="stylesheet" href="../settings.css" />
    
    <!-- 개별 스타일 선언 -->
    <link rel="stylesheet" href="../g_dark/css/g_dark.css" />
  </head>
  <body>
    <div id="root">
      <header id="header">
        <div class="logo">
          <span>Unlock the Lecture</span>
        </div>
        <div class="stage-info">
          <span id="stage-name"></span>
        </div>
      </header>

      <!-- 설정 버튼 -->
      <div id="settings-wrapper">
        <div id="settings-btn" class="settings-icon">
          <img src="../asset/img/settings-icon.png" alt="환경설정" />
        </div>
      </div>

      <div id="settings-modal" class="modal-overlay" style="display: none">
        <div class="modal-content">
          <h2 class="modal-title">MENU</h2>
          <div class="modal-buttons">
            <button id="btn-restart-all" class="menu-btn">처음부터</button>
            <button id="btn-restart-stage" class="menu-btn">다시시작</button>
            <button id="btn-skip-stage" class="menu-btn">넘어가기</button>
          </div>
          <button id="btn-close-modal" class="close-btn">닫기</button>
        </div>
      </div>

      <!-- 버튼이 뿌려질 구역 -->
      <main id="container">
        <p id="dark-guide">어둠 속에서 수업한다 버튼을 찾으세요!</p>
      </main>

      <div id="popup-overlay" class="hidden">
        <div id="popup-box">
          <p id="popup-text">땡!</p>
          <button id="popup-btn">확인</button>
        </div>
      </div>
    </div>
    <script src="../main.js" defer></script>
    <script src="../g_dark/js/g_dark.js" defer></script>
    <script src="../settings.js" defer></script>
  </body>
</html>
